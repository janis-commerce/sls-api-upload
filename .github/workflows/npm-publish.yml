name: NPM Publish

on:
  push:
    tags: [ '*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - run: npm i
      - run: npm test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org/
      - run: npm i
      - run: |
          TAG=$(echo $GITHUB_REF_NAME | grep -oP '^v\d+\.\d+\.\d+-?\K(\w+)?')
          npm publish --tag ${TAG:-latest} --access public
        env:
          NODE_AUTH_TOKEN: ${{secrets.npm_token}}

  notify-slack:
    needs: publish-npm
    uses: janis-commerce/.github/.github/workflows/slack-notify-publish.yml@master
    with:
      username: sls-api-upload
    secrets:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
